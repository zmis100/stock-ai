<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 뉴스 AI 분석기</title>
<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
</head>
<body>

<!-- API Key Setup (first time only) -->
<div id="setupScreen" class="setup-screen" style="display:none;">
  <div class="setup-card">
    <div class="setup-icon">📈</div>
    <h1>주식 뉴스 AI 분석기</h1>
    <p class="setup-desc">Gemini API 키를 입력하면 실시간 주식 뉴스 분석을 시작할 수 있어요</p>
    <div class="setup-form">
      <input type="password" id="setupGeminiKey" placeholder="Gemini API Key" class="setup-input">
      <input type="text" id="setupNaverId" placeholder="Naver Client ID" class="setup-input">
      <input type="password" id="setupNaverSecret" placeholder="Naver Client Secret" class="setup-input">
      <button id="setupSaveBtn" class="setup-btn">시작하기</button>
    </div>
    <p class="setup-hint">모든 키는 브라우저에만 저장되며, 한 번 입력하면 다시 필요 없어요</p>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">📈 주식 AI</h1>
      <button class="icon-btn" id="settingsBtn" title="설정">⚙</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="search">🔍 종목</button>
    <button class="tab" data-tab="market">📊 시장</button>
    <button class="tab" data-tab="theme">🎯 테마</button>
  </nav>

  <main class="main">
    <!-- Tab 1: Stock Search -->
    <section id="tabSearch" class="tab-content active">
      <div class="search-box">
        <input type="text" id="stockInput" placeholder="종목명 (예: 삼성전자)" class="search-input">
        <button id="searchBtn" class="search-btn">분석</button>
      </div>
      <div class="quick-chips">
        <button class="chip" data-q="삼성전자">삼성전자</button>
        <button class="chip" data-q="SK하이닉스">SK하이닉스</button>
        <button class="chip" data-q="카카오">카카오</button>
        <button class="chip" data-q="네이버">네이버</button>
        <button class="chip" data-q="현대차">현대차</button>
        <button class="chip" data-q="LG에너지솔루션">LG에너지</button>
        <button class="chip" data-q="셀트리온">셀트리온</button>
        <button class="chip" data-q="POSCO홀딩스">POSCO</button>
        <button class="chip" data-q="삼성바이오로직스">삼성바이오</button>
        <button class="chip" data-q="기아">기아</button>
      </div>
      <div id="searchResult" class="result-area"></div>
    </section>

    <!-- Tab 2: Market Overview -->
    <section id="tabMarket" class="tab-content">
      <div class="market-intro">
        <p>실시간 시장 동향을 AI가 분석합니다</p>
        <button id="marketBtn" class="action-btn">📊 시장 동향 분석</button>
      </div>
      <div id="marketResult" class="result-area"></div>
    </section>

    <!-- Tab 3: Theme Analysis -->
    <section id="tabTheme" class="tab-content">
      <div class="theme-grid" id="themeGrid"></div>
      <div id="themeResult" class="result-area"></div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Gemini API 키</label>
          <input type="password" id="sGeminiKey" class="setting-input" style="width:100%;margin-bottom:10px;">
        </div>
        <div class="setting-group">
          <label>Naver Client ID</label>
          <input type="text" id="sNaverId" class="setting-input" style="width:100%;margin-bottom:10px;">
        </div>
        <div class="setting-group">
          <label>Naver Client Secret</label>
          <input type="password" id="sNaverSecret" class="setting-input" style="width:100%;margin-bottom:10px;">
        </div>
        <button class="save-btn" id="sSaveBtn">저장</button>
        <div class="setting-info">
          <p>모든 키는 브라우저 localStorage에만 저장됩니다.</p>
          <p class="version">v1.2</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
