<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 뉴스 AI 분석기</title>
<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
</head>
<body>

<!-- API Key Setup (first time) -->
<div id="setupScreen" class="setup-screen" style="display:none;">
  <div class="setup-card">
    <div class="setup-icon">📈</div>
    <h1>주식 뉴스 AI 분석기</h1>
    <p class="setup-desc">Gemini API 키를 입력하면 실시간 주식 뉴스 분석을 시작할 수 있어요</p>
    <div class="setup-form">
      <input type="password" id="setupKeyInput" placeholder="Gemini API Key" class="setup-input">
      <button id="setupSaveBtn" class="setup-btn">시작하기</button>
    </div>
    <p class="setup-hint">키는 이 브라우저에만 저장되며, 어디에도 전송되지 않아요</p>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none;">
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">📈 주식 AI</h1>
      <button class="icon-btn" id="settingsBtn" title="설정">⚙</button>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab active" data-tab="search">🔍 종목 분석</button>
    <button class="tab" data-tab="market">📊 시장 동향</button>
    <button class="tab" data-tab="theme">🎯 테마 분석</button>
  </nav>

  <main class="main">
    <!-- Tab 1: Stock Search -->
    <section id="tabSearch" class="tab-content active">
      <div class="search-box">
        <input type="text" id="stockInput" placeholder="종목명 입력 (예: 삼성전자, SK하이닉스)" class="search-input">
        <button id="searchBtn" class="search-btn">분석</button>
      </div>
      <div class="quick-chips">
        <button class="chip" data-q="삼성전자">삼성전자</button>
        <button class="chip" data-q="SK하이닉스">SK하이닉스</button>
        <button class="chip" data-q="카카오">카카오</button>
        <button class="chip" data-q="네이버">네이버</button>
        <button class="chip" data-q="현대차">현대차</button>
        <button class="chip" data-q="LG에너지솔루션">LG에너지</button>
        <button class="chip" data-q="셀트리온">셀트리온</button>
        <button class="chip" data-q="POSCO홀딩스">POSCO</button>
      </div>
      <div id="searchResult" class="result-area"></div>
    </section>

    <!-- Tab 2: Market Overview -->
    <section id="tabMarket" class="tab-content">
      <div class="market-intro">
        <p>오늘의 주요 시장 동향을 AI가 분석합니다</p>
        <button id="marketBtn" class="action-btn">📊 시장 동향 분석 시작</button>
      </div>
      <div id="marketResult" class="result-area"></div>
    </section>

    <!-- Tab 3: Theme Analysis -->
    <section id="tabTheme" class="tab-content">
      <div class="theme-grid">
        <button class="theme-card" data-q="AI 반도체 관련주 최신 동향">
          <span class="theme-icon">🤖</span><span class="theme-label">AI/반도체</span>
        </button>
        <button class="theme-card" data-q="2차전지 배터리 관련주 최신 동향">
          <span class="theme-icon">🔋</span><span class="theme-label">2차전지</span>
        </button>
        <button class="theme-card" data-q="바이오 제약 관련주 최신 동향">
          <span class="theme-icon">💊</span><span class="theme-label">바이오</span>
        </button>
        <button class="theme-card" data-q="자동차 전기차 관련주 최신 동향">
          <span class="theme-icon">🚗</span><span class="theme-label">자동차/EV</span>
        </button>
        <button class="theme-card" data-q="엔터테인먼트 게임 관련주 최신 동향">
          <span class="theme-icon">🎮</span><span class="theme-label">엔터/게임</span>
        </button>
        <button class="theme-card" data-q="방산 방위산업 관련주 최신 동향">
          <span class="theme-icon">🛡️</span><span class="theme-label">방산</span>
        </button>
        <button class="theme-card" data-q="로봇 자동화 관련주 최신 동향">
          <span class="theme-icon">🦾</span><span class="theme-label">로봇</span>
        </button>
        <button class="theme-card" data-q="원자력 에너지 관련주 최신 동향">
          <span class="theme-icon">⚡</span><span class="theme-label">원자력</span>
        </button>
      </div>
      <div id="themeResult" class="result-area"></div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Gemini API 키</label>
          <div class="key-row">
            <input type="password" id="apiKeyInput" class="setting-input">
            <button class="sm-btn" id="keyToggle">보기</button>
          </div>
          <button class="save-btn" id="keySaveBtn">저장</button>
        </div>
        <div class="setting-info">
          <p>이 앱은 Google Gemini API를 사용합니다.</p>
          <p>API 키는 브라우저 localStorage에만 저장됩니다.</p>
          <p class="version">v1.0 · zmis100</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
